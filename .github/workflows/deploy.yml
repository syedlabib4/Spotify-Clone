name: CD — Deploy to AWS Elastic Beanstalk

on:
  push:
    branches: [main]

env:
  AWS_REGION: 'ap-south-1'                     # Your AWS region (e.g. ap-south-1, us-east-1)
  EB_APPLICATION_NAME: 'Spotify'               # Actual Elastic Beanstalk Application Name
  EB_ENVIRONMENT_NAME: 'Spotify-env'           # Actual Elastic Beanstalk Environment Name

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: './package-lock.json'

      # 1. Build React Frontend
      - name: Install Frontend Dependencies
        run: npm ci
        working-directory: frontend

      - name: Build Frontend
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: '/api'

      # 2. Package Backend & Frontend together (Linux/Unix compatible paths)
      - name: Prepare Deployment Package
        run: |
          mkdir -p build/backend
          cp -r backend/* build/backend/
          
          # Remove local env files & local node_modules from packaging
          rm -rf build/backend/node_modules
          rm -f build/backend/.env
          
          # Copy compiled frontend build
          mkdir -p build/frontend
          cp -r frontend/dist build/frontend/
          
          # Copy EB configuration .platform folder and root package files
          cp -r .platform build/
          cp package.json build/
          cp package-lock.json build/
          
          # Create ZIP file
          cd build
          zip -r ../spotify-eb-deployment.zip .

      # 3. Deploy to AWS Elastic Beanstalk
      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: ${{ env.EB_APPLICATION_NAME }}
          environment_name: ${{ env.EB_ENVIRONMENT_NAME }}
          version_label: "git-${{ github.sha }}-${{ github.run_number }}"
          region: ${{ env.AWS_REGION }}
          deployment_package: spotify-eb-deployment.zip
